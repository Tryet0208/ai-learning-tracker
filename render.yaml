services:
  - type: web
    name: ai-learning-tracker-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///data/learning.db
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: mall_2023@qq.com
      - key: SMTP_PASS
        value: ogsymatdowiadged
      - key: SECRET_KEY
        value: change-me-to-random-string
